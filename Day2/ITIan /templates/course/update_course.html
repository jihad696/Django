{% extends 'base.html' %}
{% block content %}
<h2>Update Course</h2>
<form method="post">
    {% csrf_token %}
    <label>Name:</label> <input type="text" name="name" value="{{ course.name }}"><br>
    <label>Duration (weeks):</label> <input type="number" name="duration" value="{{ course.duration }}"><br>
    <button type="submit">Update</button>
</form>
{% endblock %}
