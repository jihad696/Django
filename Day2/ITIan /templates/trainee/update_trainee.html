{% extends 'base.html' %}
{% block content %}
<h2>Update Trainee</h2>
<form method="post">
    {% csrf_token %}
    <label>Name:</label> <input type="text" name="name" value="{{ trainee.name }}"><br>
    <label>Email:</label> <input type="email" name="email" value="{{ trainee.email }}"><br>
    <label>Phone:</label> <input type="text" name="phone" value="{{ trainee.phone }}"><br>
    <button type="submit">Update</button>
</form>
{% endblock %}
