{% extends 'base.html' %}
{% block content %}
<h2>Courses</h2>
<a href="{% url 'add_course' %}">➕ Add New Course</a>
<ul>
    {% for course in courses %}
        <li>
            {{ course.name }} ({{ course.duration }} weeks)
            <a href="{% url 'update_course' course.id %}">✏️ Edit</a> |
            <a href="{% url 'delete_course' course.id %}">🗑️ Delete</a>
        </li>
    {% empty %}
        <p>No courses available.</p>
    {% endfor %}
</ul>
{% endblock %}
